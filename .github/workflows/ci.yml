name: Pipeline CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Rendre le wrapper Maven executable
        run: chmod +x mvnw

      - name: Verifier la version de Java
        run: java -version

      - name: Verifier la version de Maven Wrapper
        run: ./mvnw -version

      - name: Compiler et tester le projet avec Maven
        run: ./mvnw -B clean verify